name: Note Workflow

on:
  workflow_dispatch:
    inputs:
      theme:
        description: '記事テーマ'
        required: true
        type: string
      target:
        description: '想定読者（ペルソナ）'
        required: true
        type: string
      message:
        description: '読者に伝えたい核メッセージ'
        required: true
        type: string
      cta:
        description: '読後のアクション（CTA）'
        required: true
        type: string
      tags:
        description: 'カンマ区切りタグ（任意）'
        required: false
        default: ''
        type: string
      is_public:
        description: '公開(true)/下書き(false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: '投稿をスキップ（生成のみ）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  research:
    name: Research (Gemini + Tavily)
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      THEME: ${{ github.event.inputs.theme }}
      TARGET: ${{ github.event.inputs.target }}
    outputs:
      research_b64: ${{ steps.collect.outputs.research_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Research with Gemini and Tavily
        id: research_step
        run: |
          # Step 1: Generate search queries
          echo "Step 1: Generating search queries..."
          QUERY_PROMPT=$(cat <<EOF
          以下のテーマとターゲットに基づき、リサーチレポートを作成するための効果的な日本語の検索クエリを5つ考えてください。
          JSON配列の形式(["クエリ1", "クエリ2", ...])で、クエリのみを出力してください。
          
          テーマ: ${THEME}
          ターゲット: ${TARGET}
          EOF
          )
          JSON_PAYLOAD=$(jq -n --arg prompt "$QUERY_PROMPT" '{contents: [{parts: [{text: $prompt}]}]}')
          API_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GOOGLE_API_KEY}" -d "$JSON_PAYLOAD")
          SEARCH_QUERIES_TEXT=$(echo "$API_RESPONSE" | jq -r '.candidates[0].content.parts[0].text' | sed 's/```json//g; s/```//g')
          SEARCH_QUERIES=$(echo "$SEARCH_QUERIES_TEXT" | jq -c '.')
          if [ -z "$SEARCH_QUERIES" ] || [ "$SEARCH_QUERIES" = "null" ]; then
            SEARCH_QUERIES=$(jq -n --arg t "$THEME" '[$t]')
          fi
          
          # Step 2: Perform search with Tavily
          echo "Step 2: Performing search with Tavily..."
          SEARCH_CONTEXT=""
          for q in $(echo "${SEARCH_QUERIES}" | jq -r '.[]'); do
            TAVILY_PAYLOAD=$(jq -n --arg key "$TAVILY_API_KEY" --arg query "$q" '{api_key: $key, query: $query, search_depth: "advanced", max_results: 5}')
            TAVILY_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d "$TAVILY_PAYLOAD" https://api.tavily.com/search)
            RESULTS=$(echo "$TAVILY_RESPONSE" | jq -r '.results[] | "Title: \(.title)\nURL: \(.url)\nContent: \(.content)\n" ')
            if [ -n "$RESULTS" ]; then
              SEARCH_CONTEXT="${SEARCH_CONTEXT}--- 検索クエリ「${q}」の結果 ---\n${RESULTS}\n"
            fi
          done
          
          # Step 3: Generate research report
          echo "Step 3: Generating research report..."
          REPORT_PROMPT=$(cat <<EOF
          あなたはプロのリサーチャーです。提供された検索結果に基づき、日本語で詳細なリサーチレポートを作成してください。
          レポートには必ずMarkdown形式で出典リンク（例：[タイトル](URL)）を含めてください。
          文字数は2000文字以上を目安とし、構造化された文章にしてください。
          
          テーマ: ${THEME}
          ターゲット: ${TARGET}
          
          検索結果:
          ${SEARCH_CONTEXT}
          EOF
          )
          JSON_PAYLOAD=$(jq -n --arg prompt "$REPORT_PROMPT" '{contents: [{parts: [{text: $prompt}]}]}')
          API_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GOOGLE_API_KEY}" -d "$JSON_PAYLOAD")
          REPORT_TEXT=$(echo "$API_RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
          mkdir -p .note-artifacts
          echo "$REPORT_TEXT" > .note-artifacts/research.md
      - name: Collect research
        id: collect
        run: |
          b64=$(base64 -w 0 .note-artifacts/research.md)
          echo "research_b64=${b64}" >> $GITHUB_OUTPUT
      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-artifacts
          path: .note-artifacts/research.md

  write:
    name: Write (Gemini)
    needs: research
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      THEME: ${{ github.event.inputs.theme }}
      TARGET: ${{ github.event.inputs.target }}
      MESSAGE: ${{ github.event.inputs.message }}
      CTA: ${{ github.event.inputs.cta }}
      INPUT_TAGS: ${{ github.event.inputs.tags }}
    outputs:
      draft_json_b64: ${{ steps.collect.outputs.draft_json_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Restore research
        env:
          RESEARCH_B64: ${{ needs.research.outputs.research_b64 }}
        run: |
          mkdir -p .note-artifacts
          echo "$RESEARCH_B64" | base64 -d > .note-artifacts/research.md
      - name: Generate draft
        run: |
          RESEARCH_REPORT=$(cat .note-artifacts/research.md)
          PROMPT=$(cat <<EOF
          あなたはプロのWebライターです。note.com向けの長文記事を日本語で生成してください。
          出力は必ず {"title":"記事タイトル", "draftBody":"記事本文...", "tags":["タグ1", "タグ2"]} という形式のJSONだけにしてください。
          本文は4000〜6000文字で、見出しや箇条書きを適切に含めてください。
          
          ---
          テーマ: ${THEME}
          ターゲット: ${TARGET}
          リサーチ内容:
          ${RESEARCH_REPORT}
          伝えたいこと: ${MESSAGE}
          読後のアクション: ${CTA}
          EOF
          )
          JSON_PAYLOAD=$(jq -n --arg prompt "$PROMPT" '{contents: [{parts: [{text: $prompt}]}], generationConfig: {responseMimeType: "application/json"}}')
          API_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GOOGLE_API_KEY}" -d "$JSON_PAYLOAD")
          DRAFT_JSON=$(echo "$API_RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          echo "$DRAFT_JSON" > .note-artifacts/draft.json
      - name: Collect draft
        id: collect
        run: |
          b64=$(base64 -w 0 .note-artifacts/draft.json)
          echo "draft_json_b64=${b64}" >> $GITHUB_OUTPUT
      - name: Upload draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-artifact
          path: .note-artifacts/draft.json

  factcheck:
    name: Fact-check (Gemini + Tavily)
    needs: write
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    outputs:
      final_b64: ${{ steps.collect.outputs.final_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Restore draft
        env:
          DRAFT_JSON_B64: ${{ needs.write.outputs.draft_json_b64 }}
        run: |
          mkdir -p .note-artifacts
          echo "$DRAFT_JSON_B64" | base64 -d > .note-artifacts/draft.json
      - name: Fact-check article
        run: |
          DRAFT_BODY=$(jq -r .draftBody .note-artifacts/draft.json)
          # (Fact-check logic using curl would be complex, so we'll do a simple pass-through for now)
          # In a real scenario, you'd generate queries, call Tavily, then call Gemini again to refine.
          echo "Fact-checking step (simple pass-through for now)..."
          cp .note-artifacts/draft.json .note-artifacts/final.json
      - name: Collect final
        id: collect
        run: |
          b64=$(base64 -w 0 .note-artifacts/final.json)
          echo "final_b64=${b64}" >> $GITHUB_OUTPUT
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-artifact
          path: .note-artifacts/final.json

  post:
    name: Post to note.com (Playwright)
    needs: factcheck
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    env:
      IS_PUBLIC: ${{ github.event.inputs.is_public }}
      STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON }}
      START_URL: https://editor.note.com/new
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          npm init -y
          npm i playwright
      - name: Restore final artifact
        uses: actions/download-artifact@v4
        with:
          name: final-artifact
          path: .
      - name: Post to note
        run: |
          node - <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'fs';
          const finalJson = JSON.parse(fs.readFileSync('final.json', 'utf-8'));
          const { title, draftBody, tags } = finalJson;
          const isPublic = process.env.IS_PUBLIC === 'true';
          const storageState = JSON.parse(process.env.STATE_JSON);
          
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({ storageState });
            const page = await context.newPage();
            await page.goto('https://editor.note.com/new');
            
            await page.waitForSelector('textarea[placeholder*="タイトル"]');
            await page.fill('textarea[placeholder*="タイトル"]', title);
            
            await page.locator('div[contenteditable="true"]').click();
            await page.keyboard.type(draftBody);
            
            if (isPublic) {
              await page.click('button:has-text("公開する")');
              // Add tag logic if needed
              await page.click('button:has-text("投稿")');
            } else {
              await page.click('button:has-text("下書き保存")');
            }
            
            await page.waitForTimeout(5000); // Wait for save/publish
            console.log(`Article "${title}" has been processed.`);
            await browser.close();
          })();
          EOF
