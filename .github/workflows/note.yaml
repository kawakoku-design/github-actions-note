name: Note Workflow

on:
  workflow_dispatch:
    inputs:
      theme:
        description: '記事テーマ'
        required: true
        type: string
      target:
        description: '想定読者（ペルソナ）'
        required: true
        type: string
      message:
        description: '読者に伝えたい核メッセージ'
        required: true
        type: string
      cta:
        description: '読後のアクション（CTA）'
        required: true
        type: string
      tags:
        description: 'カンマ区切りタグ（任意）'
        required: false
        default: ''
        type: string
      is_public:
        description: '公開(true)/下書き(false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: '投稿をスキップ（生成のみ）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  research:
    name: Research (Gemini + Tavily)
    runs-on: ubuntu-latest
    env:
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      THEME: ${{ github.event.inputs.theme }}
      TARGET: ${{ github.event.inputs.target }}
    outputs:
      research_b64: ${{ steps.collect.outputs.research_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clean and Install Dependencies
        run: |
          rm -f package.json package-lock.json
          npm init -y
          npm i @google/generative-ai@latest
      - name: Create API Key File
        run: echo "${{ secrets.GOOGLE_API_KEY }}" > .google_api_key
      - name: Research with Gemini
        run: |
          node - <<'EOF'
          import { GoogleGenerativeAI } from '@google/generative-ai';
          import fs from 'fs';
          
          const apiKey = fs.readFileSync('.google_api_key', 'utf8').trim();
          const genAI = new GoogleGenerativeAI(apiKey);
          const model = genAI.getGenerativeModel({ model: "gemini-pro" });
          
          const theme = process.env.THEME || '';
          const target = process.env.TARGET || '';
          const tavilyApiKey = process.env.TAVILY_API_KEY || '';
          const today = new Date().toISOString().slice(0,10);

          async function tavilySearch(query) {
            try {
              const response = await fetch('https://api.tavily.com/search', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: tavilyApiKey, query: query, search_depth: 'advanced', max_results: 5 })
              });
              if (!response.ok) return [];
              const data = await response.json();
              return (data.results || []).map(r => ({ title: r.title, url: r.url, content: r.content }) );
            } catch (error) { return []; }
          }
          async function main() {
            const artifactsDir = '.note-artifacts';
            fs.mkdirSync(artifactsDir, { recursive: true });
            console.log('Step 1: Generating search queries...');
            const queryGenPrompt = `以下のテーマとターゲットに基づき、リサーチレポートを作成するための効果的な日本語の検索クエリを5つ考えてください。JSON配列の形式で、クエリのみを出力してください。\n\nテーマ: ${theme}\nターゲット: ${target}`;
            let searchQueries = [];
            try {
              const result = await model.generateContent(queryGenPrompt);
              const responseText = result.response.text().replace(/```json|```/g, '').trim();
              searchQueries = JSON.parse(responseText);
            } catch (e) {
              console.error(e);
              searchQueries = [theme, theme + ' ' + target];
            }
            console.log('Step 2: Performing search with Tavily...');
            let searchContext = '';
            for (const q of searchQueries) {
              const results = await tavilySearch(q);
              if (results.length > 0) {
                searchContext += '--- 検索クエリ: "' + q + '" の結果 ---\n';
                searchContext += results.map(r => '[' + r.title + '](' + r.url + ')\n' + r.content + '\n').join('\n');
              }
            }
            console.log('Step 3: Generating research report...');
            const researchPrompt = 'あなたはプロのリサーチャーです。提供された検索結果に基づき、日本語で詳細なリサーチレポートを作成してください。レポートには必ずMarkdown形式で出典リンクを含めてください。文字数は2000文字以上を目安とします。\n\nテーマ: ' + theme + '\nターゲット: ' + target + '\n現在日付: ' + today + '\n\n---\n検索結果:\n' + searchContext;
            const result = await model.generateContent(researchPrompt);
            const report = result.response.text();
            fs.writeFileSync(artifactsDir + '/research.md', report || '');
          }
          main().catch(console.error);
          EOF
      - name: Collect research
        id: collect
        run: |
          b64=$(base64 -w 0 .note-artifacts/research.md 2>/dev/null || base64 .note-artifacts/research.md)
          echo "research_b64<<EOF" >> $GITHUB_OUTPUT
          echo "$b64" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-artifacts
          path: .note-artifacts/research.md

  write:
    name: Write (Gemini)
    needs: research
    runs-on: ubuntu-latest
    env:
      THEME: ${{ github.event.inputs.theme }}
      TARGET: ${{ github.event.inputs.target }}
      MESSAGE: ${{ github.event.inputs.message }}
      CTA: ${{ github.event.inputs.cta }}
      INPUT_TAGS: ${{ github.event.inputs.tags }}
    outputs:
      title: ${{ steps.collect.outputs.title }}
      draft_json_b64: ${{ steps.collect.outputs.draft_json_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clean and Install Dependencies
        run: |
          rm -f package.json package-lock.json
          npm init -y
          npm i @google/generative-ai@latest
      - name: Create API Key File
        run: echo "${{ secrets.GOOGLE_API_KEY }}" > .google_api_key
      - name: Restore research
        env:
          RESEARCH_B64: ${{ needs.research.outputs.research_b64 }}
        run: |
          mkdir -p .note-artifacts
          echo "$RESEARCH_B64" | base64 -d > .note-artifacts/research.md || echo "$RESEARCH_B64" | base64 --decode > .note-artifacts/research.md
      - name: Generate draft
        run: |
          node - <<'EOF'
          import { GoogleGenerativeAI } from '@google/generative-ai';
          import fs from 'fs';
          const apiKey = fs.readFileSync('.google_api_key', 'utf8').trim();
          const genAI = new GoogleGenerativeAI(apiKey);
          const model = genAI.getGenerativeModel({ model: "gemini-pro" });
          const theme=process.env.THEME||''; const target=process.env.TARGET||''; const message=process.env.MESSAGE||''; const cta=process.env.CTA||'';
          const inputTags=(process.env.INPUT_TAGS||'').split(',').map(s=>s.trim()).filter(Boolean);
          const researchReport=fs.readFileSync('.note-artifacts/research.md','utf8');
          function extractJsonFlexible(raw){
            const t = (raw || '').trim().replace(/^```json|```/g, '').trim();
            try { return JSON.parse(t); } catch (e) {}
            const f = t.indexOf('{'); const l = t.lastIndexOf('}');
            if (f !== -1 && l !== -1 && l > f) {
              try { return JSON.parse(t.slice(f, l + 1)); } catch (e) {}
            }
            return null;
          }
          async function main() {
            const prompt='あなたはプロのWebライターです。note.com向けの長文記事を日本語で生成してください。出力は必ず {"title":string, "draftBody":string, "tags":string[]} という形式のJSONだけにしてください。本文は4000〜6000文字で、見出しや箇条書きを含めてください。\n\n---\nテーマ: ' + theme + '\nターゲット: ' + target + '\nリサーチ内容:\n' + researchReport + '\n伝えたいこと: ' + message + '\n読後のアクション: ' + cta;
            const generationConfig = { temperature: 0.7, maxOutputTokens: 8192, responseMimeType: "application/json" };
            const result = await model.generateContent({ contents: [{ role: "user", parts: [{ text: prompt }] }], generationConfig });
            const responseText = result.response.text();
            let obj = extractJsonFlexible(responseText);
            if (!obj) {
              obj = { title: theme, draftBody: responseText, tags: [] };
            }
            const finalTags = Array.from(new Set([...(obj.tags || []), ...inputTags]));
            const finalDraft = { title: obj.title || theme, draftBody: obj.draftBody || '本文を生成できませんでした。', tags: finalTags };
            fs.writeFileSync('.note-artifacts/draft.json',JSON.stringify(finalDraft,null,2));
          }
          main().catch(console.error);
          EOF
      - name: Collect draft
        id: collect
        run: |
          title=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.note-artifacts/draft.json','utf8')).title)")
          b64=$(base64 -w 0 .note-artifacts/draft.json 2>/dev/null || base64 .note-artifacts/draft.json)
          echo "title<<EOF" >> $GITHUB_OUTPUT
          echo "$title" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "draft_json_b64<<EOF" >> $GITHUB_OUTPUT
          echo "$b64" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Upload draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-artifact
          path: .note-artifacts/draft.json

  factcheck:
    name: Fact-check (Gemini + Tavily)
    needs: write
    runs-on: ubuntu-latest
    env:
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      TITLE: ${{ needs.write.outputs.title }}
    outputs:
      title: ${{ steps.collect.outputs.title }}
      final_b64: ${{ steps.collect.outputs.final_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clean and Install Dependencies
        run: |
          rm -f package.json package-lock.json
          npm init -y
          npm i @google/generative-ai@latest
      - name: Create API Key File
        run: echo "${{ secrets.GOOGLE_API_KEY }}" > .google_api_key
      - name: Restore draft json
        env:
          DRAFT_JSON_B64: ${{ needs.write.outputs.draft_json_b64 }}
        run: |
          mkdir -p .note-artifacts
          echo "$DRAFT_JSON_B64" | base64 -d > .note-artifacts/draft.json || echo "$DRAFT_JSON_B64" | base64 --decode > .note-artifacts/draft.json
      - name: Fact-check with Gemini and Tavily
        run: |
          node - <<'EOF'
          import { GoogleGenerativeAI } from '@google/generative-ai';
          import fs from 'fs';
          const apiKey = fs.readFileSync('.google_api_key', 'utf8').trim();
          const genAI = new GoogleGenerativeAI(apiKey);
          const model = genAI.getGenerativeModel({ model: "gemini-pro" });
          const tavilyApiKey = process.env.TAVILY_API_KEY || '';
          const draft=JSON.parse(fs.readFileSync('.note-artifacts/draft.json','utf8'));
          async function tavilySearch(query) {
            try {
              const response = await fetch('https://api.tavily.com/search', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: tavilyApiKey, query: query, search_depth: 'advanced', max_results: 3, include_answer: true })
              });
              if (!response.ok) return '';
              const data = await response.json();
              let context = data.answer ? '回答: ' + data.answer + '\n' : '';
              context += (data.results || []).map(r => 'URL: ' + r.url + '\n内容: ' + r.content).join('\n\n');
              return context;
            } catch (e) { return ''; }
          }
          async function main() {
            console.log('Step 1: Proposing fact-check queries...');
            const queryPrompt = 'あなたは事実検証の専門家です。以下の記事本文から、検証が必要な主張を5つ抽出し、検証用の日本語検索クエリをJSON配列で出力してください。\n\n記事本文:\n' + draft.draftBody;
            let queries = [];
            try {
              const result = await model.generateContent(queryPrompt);
              const responseText = result.response.text().replace(/```json|```/g, '').trim();
              queries = JSON.parse(responseText);
            } catch (e) {
              queries = [process.env.TITLE || draft.title];
            }
            console.log('Step 2: Gathering evidence from Tavily...');
            let evidence = '';
            for (const q of queries) {
              evidence += '--- 「' + q + '」の検証結果 ---\n' + await tavilySearch(q) + '\n\n';
            }
            console.log('Step 3: Generating final article...');
            const finalPrompt = 'あなたはプロの編集者です。提供された下書きと検証結果に基づき、事実誤認を修正し、より正確な表現にした最終版の記事本文を日本語で生成してください。元の文章のスタイルは尊重してください。前置きなどは不要で、最終的な記事の本文のみを出力してください。\n\n---\n下書き:\n' + draft.draftBody + '\n\n---\n検証結果:\n' + evidence;
            const result = await model.generateContent(finalPrompt);
            const finalBody = result.response.text();
            const finalArticle = { title: draft.title, body: finalBody, tags: draft.tags };
            fs.writeFileSync('.note-artifacts/final.json', JSON.stringify(finalArticle, null, 2));
          }
          main().catch(console.error);
          EOF
      - name: Upload fact-check artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-artifact
          path: .note-artifacts/final.json
      - name: Collect final
        id: collect
        run: |
          title=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.note-artifacts/final.json','utf8')).title)")
          b64=$(base64 -w 0 .note-artifacts/final.json 2>/dev/null || base64 .note-artifacts/final.json)
          echo "title<<EOF" >> $GITHUB_OUTPUT
          echo "$title" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "final_b64<<EOF" >> $GITHUB_OUTPUT
          echo "$b64" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
  
  post:
    name: Post to note.com (Playwright)
    needs: factcheck
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    env:
      IS_PUBLIC: ${{ github.event.inputs.is_public }}
      STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON }}
      START_URL: https://editor.note.com/new
    outputs:
      final_url: ${{ steps.publish.outputs.published_url || steps.publish.outputs.draft_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright marked
          npx playwright install --with-deps chromium | cat
      - name: Prepare storageState
        id: state
        run: |
          test -n "$STATE_JSON" || (echo "ERROR: NOTE_STORAGE_STATE_JSON secret is not set" && exit 1)
          mkdir -p "$RUNNER_TEMP"
          echo "$STATE_JSON" > "$RUNNER_TEMP/note-state.json"
          echo "STATE_PATH=$RUNNER_TEMP/note-state.json" >> $GITHUB_OUTPUT
      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
      - name: Restore final
        id: draft
        env:
          FINAL_B64: ${{ needs.factcheck.outputs.final_b64 }}
        run: |
          test -n "$FINAL_B64" || { echo "final_b64 output is empty"; exit 1; }
          echo "$FINAL_B64" | base64 -d > final.json || echo "$FINAL_B64" | base64 --decode > final.json
          echo "TITLE=$(jq -r .title final.json)" >> $GITHUB_OUTPUT
          echo "TAGS=$(jq -r '.tags | join(", ")' final.json)" >> $GITHUB_OUTPUT
      - name: Publish via Playwright
        id: publish
        env:
          TITLE: ${{ steps.draft.outputs.TITLE }}
          TAGS: ${{ steps.draft.outputs.TAGS }}
          STATE_PATH: ${{ steps.state.outputs.STATE_PATH }}
        run: |
          cat > post.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { marked } from 'marked';
          import fs from 'fs';
          import os from 'os';
          import path from 'path';
          function nowStr(){ const d=new Date(); const z=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}_${z(d.getHours())}-${z(d.getMinutes())}-${z(d.getSeconds())}`; }
          const STATE_PATH=process.env.STATE_PATH;
          const START_URL=process.env.START_URL||'https://editor.note.com/new';
          const rawTitle=process.env.TITLE||'';
          const rawFinal=JSON.parse(fs.readFileSync('final.json','utf8'));
          const rawBody=String(rawFinal.body||'');
          const TAGS=process.env.TAGS||'';
          const IS_PUBLIC=String(process.env.IS_PUBLIC||'false')==='true';
          if(!fs.existsSync(STATE_PATH)){ console.error('storageState not found'); process.exit(1); }
          const ssDir=path.join(os.tmpdir(),'note-screenshots'); fs.mkdirSync(ssDir,{recursive:true}); const SS_PATH=path.join(ssDir,`note-post-${nowStr()}.png`);
          function sanitizeTitle(t){
            let s=String(t||'').trim();
            s=s.replace(/^```[a-zA-Z0-9_-]*\s*$/,'').replace(/^```$/,'');
            s=s.replace(/^#+\s*/,'');
            s=s.replace(/^"+|"+$/g,'').replace(/^'+|'+$/g,'').replace(/^`+|`+$/g,'');
            s=s.replace(/^json$/i,'').trim();
            if (/^[\{\}\[\]\(\)\s]*$/.test(s)) s='';
            if(!s) s='自動生成タイトル';
            return s;
          }
          let browser, context, page;
          try{
            browser = await chromium.launch({ headless: true, args: ['--lang=ja-JP'] });
            context = await browser.newContext({ storageState: STATE_PATH, locale: 'ja-JP' });
            page = await context.newPage();
            page.setDefaultTimeout(180000);
            await page.goto(START_URL, { waitUntil: 'domcontentloaded' });
            await page.waitForSelector('textarea[placeholder*="タイトル"]');
            await page.fill('textarea[placeholder*="タイトル"]', sanitizeTitle(rawTitle));
            const bodyBox = page.locator('div[contenteditable="true"][role="textbox"]').first();
            await bodyBox.waitFor({ state: 'visible' });
            await bodyBox.click();
            await page.keyboard.type(rawBody);
            if(!IS_PUBLIC){
              const saveBtn = page.locator('button:has-text("下書き保存")').first();
              await saveBtn.waitFor({ state: 'visible' });
              if(await saveBtn.isEnabled()) { await saveBtn.click(); await page.waitForTimeout(2000); }
              await page.screenshot({ path: SS_PATH, fullPage: true });
              console.log('DRAFT_URL=' + page.url());
              process.exit(0);
            }
            const proceed = page.locator('button:has-text("公開に進む")').first();
            await proceed.waitFor({ state: 'visible' });
            await proceed.click({ force: true });
            await page.waitForTimeout(2000);
            const tags=(TAGS||'').split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
            if(tags.length){
              const tagInput=page.locator('input[placeholder*="ハッシュタグ"]').first();
              await tagInput.waitFor({ state: 'visible' });
              for(const t of tags){ await tagInput.click(); await tagInput.fill(t); await page.keyboard.press('Enter'); await page.waitForTimeout(200); }
            }
            const publishBtn = page.locator('button:has-text("投稿する")').first();
            await publishBtn.waitFor({ state: 'visible' });
            await publishBtn.click({ force: true });
            await page.waitForTimeout(5000);
            await page.screenshot({ path: SS_PATH, fullPage: true });
            console.log('PUBLISHED_URL=' + page.url());
          } finally {
            try{ await page?.close(); }catch{}
            try{ await context?.close(); }catch{}
            try{ await browser?.close(); }catch{}
          }
          EOF
          node post.mjs | tee post.log
          url=$(grep '^PUBLISHED_URL=' post.log | tail -n1 | cut -d'=' -f2-)
          draft=$(grep '^DRAFT_URL=' post.log | tail -n1 | cut -d'=' -f2-)
          if [ -n "$url" ]; then echo "published_url=$url" >> $GITHUB_OUTPUT; fi
          if [ -n "$draft" ]; then echo "draft_url=$draft" >> $GITHUB_OUTPUT; fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-screenshot
          path: /tmp/note-screenshots/*.png
          if-no-files-found: ignore
